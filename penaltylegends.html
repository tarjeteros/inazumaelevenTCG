<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="ui/icon.png">
    <link rel="shortcut icon" href="ui/icon.png">
    <link rel="apple-touch-icon" href="ui/icon.png">


    <title>Penalty Legends</title>

        <link rel="stylesheet" href="css/sidebar-menu.css">
<!-- Fallback desde Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* Fuente local: asegúrate de que el archivo se llame exactamente así */
        @font-face {
            font-family: 'PressStart';
            src: url('PressStart2P.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url('ui/fondo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Logo superior con link a inicio */
        .logo {
            width: 300px;
            margin-top: 20px;
            display: inline-block;
        }

            .logo, .logo:hover {
                transform: none; /* nunca zoom */
                cursor: pointer;
            }

        /* Panel blanco y esquinas: igual que la otra página */
        .collections {
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.8);
            display: inline-block;
            border-radius: 10px;
            width: 35%;
            position: relative;
        }

        .corner-images {
            position: absolute;
            top: -20px;
            width: 100px;
            height: auto;
        }

        .corner-left {
            left: -30px;
            top: -30px;
        }

        .corner-right {
            right: -30px;
            top: -30px;
        }

        /* Contenido principal dentro del panel */
        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* Título con la fuente retro */
        .tituloJuego {
            font-family: 'Press Start 2P','PressStart',sans-serif;
            font-size: 20px;
            margin: 12px 0 6px 0;
            line-height: 1.25;
        }

        /* Logo del juego (sin zoom) */
        .game-logo {
            width: 260px;
            margin-bottom: 10px;
        }

        .no-zoom, .no-zoom:hover {
            transform: none !important;
            cursor: default;
        }

        /* Fila de botones */
        .btn-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 18px 0;
            flex-wrap: wrap;
            width: 100%;
        }

        .button-img {
            width: 180px;
            height: auto;
            display: block;
            border-radius: 8px;
        }
            /* Hover solo para botones (recuperado) */
            .button-img:hover {
                transform: scale(1.07);
                transition: transform 0.15s ease-in-out;
            }

        /* Bloque de capturas */
        .captures {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
            width: 100%;
        }

        .capture {
            width: 200px;
            height: auto;
            border-radius: 5px;
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
        }

            .capture:hover {
                transform: scale(1.1);
            }

        .modal {
            display: none; /* oculto por defecto */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

            .modal img {
                max-width: 90vw;
                max-height: 90vh;
                width: auto;
                height: auto;
                object-fit: contain;
                cursor: default;
            }

                .modal img:hover {
                    transform: none;
                }

        /* Botón menú lateral (igual que tu otra página) */

        /* ======= Responsive: calcado del 1-1.html ======= */
        @media (max-width: 768px) {
            .collections {
                width: 50%;
            }
            /* panel estrecho en móvil como tu otra sección */
            .corner-images {
                width: 80px;
            }
            /* esquinas visibles y más pequeñas */

            .tituloJuego {
                font-size: 14px;
            }

            .game-logo {
                width: 64vw;
            }
            /* logo del juego adaptable */
            .btn-row {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }

            .button-img {
                width: 100%;
                max-width: 420px; /* botones apilados, ancho cómodo */
                margin: 0 auto;
            }

            .capture {
                width: 45vw !important;
                cursor: default !important;
                pointer-events: none !important;
            }

            .modal {
                display: none !important;
            }
        }

        @media (max-width: 420px) {
            .tituloJuego {
                font-size: 12px;
            }

            .capture {
                width: calc(100vw - 48px);
            }
            /* 1 columna en móviles muy estrechos */
        }
    </style>
</head>
<body>

    <header>
        <!-- Logo superior: link a inicio -->
        <a href="index.html" aria-label="Ir a inicio">
            <img src="ui/logo.png" alt="Ir a inicio" class="logo">
        </a>
    </header>

    <!-- Botón para abrir el menú -->
    <button class="menu-button" onclick="toggleMenu()">
        <img src="botones/menu.png" alt="Menú">
    </button>

    <!-- Menú lateral (mismo contenido que en tus páginas) -->
    <div id="side-menu" class="side-menu"></div>

    <section class="collections">
        <img src="ui/c1.png" alt="Esquina Izquierda" class="corner-images corner-left">
        <img src="ui/c2.png" alt="Esquina Derecha" class="corner-images corner-right">

        <div class="gallery">
            <!-- CONTENIDO DEL JUEGO -->
            <img src="penaltylegends/logo.png" alt="Penalty Legends" class="game-logo no-zoom" draggable="false" />

            <p style="font-family:'Press Start 2P','PressStart',sans-serif; font-size:12px; margin-top:20px; margin-bottom:10px; line-height:1.4;">
                Este es un fangame de Inazuma Eleven para dispositivos Android y Windows, todos los derechos de imagen pertenecen a LEVEL-5.
            </p>

            <h3 class="tituloJuego" style="font-size:16px;">ENLACES</h3>

            <div class="btn-row">
                <!-- Sustituye los href y las rutas por las tuyas -->
                <a href="https://www.youtube.com/watch?v=WrE_hLXCbrc" target="_blank" rel="noopener">
                    <img src="penaltylegends/trailer.png" alt="Ver tráiler" class="button-img" />
                </a>
                <a href="https://drive.google.com/drive/folders/16epiUy-kuRIn4Sv6yDejyTZgb0xXzGUA?usp=drive_link" target="_blank" rel="noopener">
                    <img src="penaltylegends/android.png" alt="Descargar Android" class="button-img" />
                </a>
                <a href="https://drive.google.com/drive/folders/176oeBcn_E05-xt9fSnMrBK3wwvILw0KN?usp=drive_link" target="_blank" rel="noopener">
                    <img src="penaltylegends/windows.png" alt="Descargar Windows" class="button-img" />
                </a>
            </div>

            <h3 class="tituloJuego" style="font-size:16px;">CAPTURAS DEL JUEGO</h3>

            <div class="captures">
                <img src="penaltylegends/cap1.jpg" alt="Captura 1" class="capture" onclick="openModal(this.src)" />
                <img src="penaltylegends/cap2.jpg" alt="Captura 2" class="capture" onclick="openModal(this.src)" />
                <img src="penaltylegends/cap3.jpg" alt="Captura 3" class="capture" onclick="openModal(this.src)" />
                <img src="penaltylegends/cap4.jpg" alt="Captura 4" class="capture" onclick="openModal(this.src)" />
                <img src="penaltylegends/cap5.jpg" alt="Captura 5" class="capture" onclick="openModal(this.src)" />
            </div>

        </div>

        <!-- Modal -->
        <div id="modal" class="modal" onclick="closeModal()">
            <img id="modal-img" src="" alt="Vista ampliada" onclick="event.stopPropagation();">
        </div>
    </section>

        <script src="js/menu.js"></script>
    <script src="js/common.js"></script>
</body>
</html>
